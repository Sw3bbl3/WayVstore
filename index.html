<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/assets/js/include.js"></script>
  <script src="/assets/js/home-hero-carousel.js" defer></script>
  <title>WayV | Orion-First Creative Technology</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/wayv-logo.svg">
  <meta name="description" content="WayV builds modern creative technology across Orion DAW, Wave Engine, and an open product ecosystem.">
  <meta name="theme-color" content="#2b7cff">
</head>
<body class="home-page">
  <div id="header-include"></div>

  <main class="page-main">
    <section class="page-shell page-hero" data-scene>
      <article class="home-hero" data-scene-layer="1">
        <div class="hero-grid">
          <div class="stack home-launch-copy" data-reveal>
            <div class="home-hero-track" data-home-carousel-text>
              <article class="home-hero-slide slide-orion is-active" data-home-slide>
                <h1 class="hero-title">Orion is now released for Free</h1>
                <div class="btn-row">
                  <a href="/orion.html" class="btn btn-primary">Download Orion</a>
                  <a href="/news.html" class="btn btn-secondary">Learn more</a>
                </div>
              </article>

              <article class="home-hero-slide slide-wave-engine" data-home-slide>
                <h1 class="hero-title">Wave Engine is being developed</h1>
                <div class="btn-row">
                  <a href="/wave-engine.html" class="btn btn-primary">View Wave Engine</a>
                  <a href="/news.html" class="btn btn-secondary">Development news</a>
                </div>
              </article>

              <article class="home-hero-slide slide-waveos" data-home-slide>
                <h1 class="hero-title">WaveOS, our operating system, is being developed</h1>
                <div class="btn-row">
                  <a href="/ecosystem.html" class="btn btn-primary">Explore WaveOS</a>
                  <a href="/news.html" class="btn btn-secondary">Development news</a>
                </div>
              </article>
            </div>

            <div class="home-carousel-dots" role="tablist" aria-label="Homepage highlights">
              <button class="home-carousel-dot is-active" type="button" data-home-carousel-dot="0" aria-label="Show Orion update" aria-selected="true"></button>
              <button class="home-carousel-dot" type="button" data-home-carousel-dot="1" aria-label="Show Wave Engine update" aria-selected="false"></button>
              <button class="home-carousel-dot" type="button" data-home-carousel-dot="2" aria-label="Show WaveOS update" aria-selected="false"></button>
            </div>
            <div class="home-carousel-progress" aria-hidden="true"><span data-home-carousel-progress></span></div>
          </div>

          <figure class="hero-media" data-reveal>
            <div class="hero-media-inner">
              <img
                src="/assets/images/laptop-orion-dark-cutout.png"
                class="home-feature-media media-laptop"
                alt="Orion DAW on laptop"
                data-home-carousel-media
                data-parallax
                data-speed="0.12"
              />
            </div>
          </figure>
        </div>
      </article>
    </section>
  </main>

  <div id="footer-include"></div>
</body>
</html>
